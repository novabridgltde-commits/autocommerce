[pytest]
# AutoCommerce V25 — Profil targeted (smoke / PR ciblée)
asyncio_mode = auto
asyncio_default_fixture_loop_scope = session
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Marqueurs personnalisés
markers =
    unit: Tests unitaires (rapides, sans dépendances externes)
    integration: Tests d'intégration (avec DB et services)
    e2e: Tests End-to-End (flux complets)
    security: Tests de sécurité
    performance: Tests de performance
    slow: Tests lents (> 5 secondes)

# Aucun gate global ici : ce profil doit rester utilisable sur des sous-ensembles de tests.
addopts =
    --cov=.
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-config=.coveragerc
    -v
    --tb=short
    --strict-markers
    --color=yes
    --junitxml=reports/regression.xml

# Timeout global (secondes)
timeout = 30

# Filtres de warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::UserWarning:sqlalchemy
