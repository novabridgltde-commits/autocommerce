[pytest]
# AutoCommerce V25 — Profil full (CI release)
asyncio_mode = auto
asyncio_default_fixture_loop_scope = session
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

markers =
    unit: Tests unitaires (rapides, sans dépendances externes)
    integration: Tests d'intégration (avec DB et services)
    e2e: Tests End-to-End (flux complets)
    security: Tests de sécurité
    performance: Tests de performance
    slow: Tests lents (> 5 secondes)

addopts =
    --cov=.
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-config=.coveragerc
    --cov-fail-under=55
    -v
    --tb=short
    --strict-markers
    --color=yes
    --junitxml=reports/regression_full.xml

timeout = 30

filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::UserWarning:sqlalchemy
