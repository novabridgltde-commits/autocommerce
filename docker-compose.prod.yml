# =============================================================================
# AutoCommerce V25 — docker-compose.prod.yml
# Déploiement production monoserveur
#
# Services :
#   postgres  — PostgreSQL 16 + pgvector
#   redis     — Redis 7 (rate-limit, cache, sessions, queues)
#   api       — FastAPI / Uvicorn (backend)
#   frontend  — React/Vite buildé, servi par Nginx
#   nginx     — Reverse proxy TLS/HTTPS (optionnel si Traefik ou autre)
#
# Usage :
#   cp .env.prod.example .env.prod
#   # Remplir TOUS les CHANGE_ME_ dans .env.prod
#   docker compose -f docker-compose.prod.yml --env-file .env.prod up -d
# =============================================================================

x-common-env: &common-env
  env_file: .env.prod
  restart: unless-stopped
  logging:
    driver: json-file
    options:
      max-size: "20m"
      max-file: "5"

services:

  # ── PostgreSQL 16 + pgvector ───────────────────────────────────────────────
  postgres:
    <<: *common-env
    image: pgvector/pgvector:pg16
    container_name: ac_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-autocommerce}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-autocommerce}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend
    ports:
      - "127.0.0.1:5432:5432"      # exposé uniquement sur loopback
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-autocommerce} -d ${POSTGRES_DB:-autocommerce}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Redis 7 ───────────────────────────────────────────────────────────────
  redis:
    <<: *common-env
    image: redis:7-alpine
    container_name: ac_redis
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --appendonly yes
      --appendfsync everysec
    volumes:
      - redis_data:/data
    networks:
      - backend
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Migration (one-shot, s'arrête après) ──────────────────────────────────
  migrate:
    <<: *common-env
    build:
      context: ./api-server
      dockerfile: Dockerfile
      target: runtime
    container_name: ac_migrate
    command: ["python3", "-m", "alembic", "upgrade", "head"]
    environment:
      RUN_MIGRATIONS_ON_BOOT: "0"
    networks:
      - backend
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # ── API FastAPI ────────────────────────────────────────────────────────────
  api:
    <<: *common-env
    build:
      context: ./api-server
      dockerfile: Dockerfile
      target: runtime
    container_name: ac_api
    environment:
      RUN_MIGRATIONS_ON_BOOT: "0"         # migrations gérées par le service migrate
      UVICORN_WORKERS: ${UVICORN_WORKERS:-4}
      TRUSTED_PROXY_IPS: "172.16.0.0/12" # réseau Docker interne
      SKIP_LIMITER: "0"                   # rate-limit OBLIGATOIRE en prod
    volumes:
      - uploads_data:/app/uploads
      - api_logs:/app/logs
    networks:
      - backend
      - frontend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1536M
        reservations:
          memory: 512M

  # ── Frontend React (Nginx standalone) ─────────────────────────────────────
  frontend:
    <<: *common-env
    build:
      context: ./autocommerce-app
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ""                  # vide = même origine, proxy nginx
    container_name: ac_frontend
    environment:
      API_UPSTREAM: "http://api:8000"
    networks:
      - frontend
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1/nginx-health >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ── Nginx reverse proxy (TLS + rate-limit HTTP) ───────────────────────────
  nginx:
    <<: *common-env
    image: nginx:1.27-alpine
    container_name: ac_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro          # certificats TLS (Let's Encrypt)
      - nginx_logs:/var/log/nginx
    networks:
      - frontend
    depends_on:
      frontend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nginx -t && curl -fsS http://127.0.0.1/nginx-health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  uploads_data:
    driver: local
  api_logs:
    driver: local
  nginx_logs:
    driver: local

networks:
  backend:
    driver: bridge
    internal: true        # postgres + redis non accessibles depuis l'extérieur
  frontend:
    driver: bridge
