<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>AutoCommerce</title>
    <meta name="description" content="Plateforme e-commerce intelligente pour gérer votre boutique" />
    <!-- MED-2 FIX: Content-Security-Policy — protège contre XSS stocké.
         'unsafe-inline' conservé pour la compatibilité du bundle Vite actuel.
         Migrer vers nonce-based CSP après refactor du bundler.
         connect-src inclut wss: pour les websockets et *.googleapis.com pour les fonts. -->
    <meta http-equiv="Content-Security-Policy" content="
      default-src 'self';
      script-src 'self';
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
      font-src 'self' https://fonts.gstatic.com data:;
      img-src 'self' data: blob: https:;
      connect-src 'self' https: wss: http://localhost:* ws://localhost:*;
      frame-ancestors 'none';
      base-uri 'self';
      form-action 'self';
      object-src 'none';
    " />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛍️</text></svg>" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
