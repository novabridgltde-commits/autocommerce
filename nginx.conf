# ════════════════════════════════════════════════════════════════════════════
# AutoCommerce V25 — Nginx Configuration
# ════════════════════════════════════════════════════════════════════════════
# Fonctions:
#   - Sert le frontend React (dist/public/) en statique
#   - Proxy /api/* vers le backend FastAPI (port 8000)
#   - Proxy /ws/* vers les websockets FastAPI
#   - Headers de sécurité (HSTS, CSP, X-Frame-Options)
#   - Gzip compression
#   - Cache statique (assets vendeur)
# ════════════════════════════════════════════════════════════════════════════

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ── Logging ───────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    # ── Performance ────────────────────────────────────────────────────────
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml;
    gzip_min_length 1000;

    # ── Rate limiting (protection DDoS basique) ────────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m rate=20r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;

    # ── Upstream API ───────────────────────────────────────────────────────
    upstream api_backend {
        server api:8000;
        keepalive 32;
    }

    server {
        listen 80;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        # ── Security headers ─────────────────────────────────────────────
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
        # SEC FIX: HSTS enabled — requires HTTPS (Certbot/Let's Encrypt must be set up first)
        # max-age=31536000 = 1 year; remove includeSubDomains if subdomains are HTTP-only
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # ── API Proxy ────────────────────────────────────────────────────
        location /api/ {
            limit_req zone=api burst=50 nodelay;

            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            # Timeouts
            proxy_connect_timeout 10s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            # Buffer size (upload support)
            proxy_buffer_size 128k;
            proxy_buffers 4 256k;
            client_max_body_size 15M;
        }

        # ── Auth endpoints — rate limit plus strict ───────────────────────
        location ~ ^/api/v1/auth/(login|register|forgot-password) {
            limit_req zone=auth burst=3 nodelay;
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ── WebSocket (si utilisé) ────────────────────────────────────────
        location /ws/ {
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 3600s;
        }

        # ── Assets statiques (cache long) ────────────────────────────────
        location /assets/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # ── SPA fallback — toutes les routes non-API → index.html ────────
        location / {
            try_files $uri $uri/ /index.html;
        }

        # ── Health check nginx (pour les load balancers) ──────────────────
        location /nginx-health {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }
    }
}
